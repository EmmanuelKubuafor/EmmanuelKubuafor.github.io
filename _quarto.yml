project:
  type: website
  output-dir: docs

# Meta
description-meta: "Academic website for Emmanuel Kubuafor, statistician and data scientist."
author-meta: "Emmanuel Kubuafor"

website:
  title: ""
  google-analytics: "G-P4RRCG44LP"
  image: "files/images/Profile picture_Emmanuel_Kubuafor.jpg"
  description: "Personal academic site for research, teaching, and projects"
  navbar:
    background: "#4B2E83"
    foreground: "#FFFFFF"
    pinned: true
    logo: files/images/uw logo 2.png
    logo-alt: "University of Washington"
    left:
      - text: Home
        href: index.qmd
      - text: Research
        menu:
          - text: Selected Manuscripts
            href: publications.qmd
          - text: Academic Projects
            href: projects.qmd
      - text: Teaching
        href: teaching.qmd
      - text: Awards & Honors
        href: Awards.qmd
      - text: Featured Posts
        href: posts.qmd
    right:
      - text: CV
        href: files/CV for EmmanuelKubuafor.pdf
        target: _blank
      - icon: github
        href: https://github.com/EmmanuelKubuafor
        target: _blank
  page-navigation: true
  page-footer:
    left: "[EmmanuelKubuafor](https://github.com/EmmanuelKubuafor) &copy; <script>document.write(new Date().getFullYear())</script>"
    center: 'Last updated <script>document.write(new Date(document.lastModified).toLocaleDateString("en-US", {year:"numeric", month:"long", day:"numeric"}))</script>'
    right:
      - icon: github
        href: https://github.com/EmmanuelKubuafor
        target: _blank
      #- icon: file-text
        # text: Rpubs
        # href: https://rpubs.com/Emmanuel_Kubuafor
        # target: _blank
  search:
    location: navbar
    type: textbox
  reader-mode: true
  draft-mode: unlinked
  repo-url: https://github.com/EmmanuelKubuafor/EmmanuelKubuafor.github.io
  open-graph: true
  twitter-card: true
  site-url: "https://EmmanuelKubuafor.github.io"

format:
  html:
    theme:
      light: cosmo
      dark: [cosmo, theme-dark.scss]
    css:
      - styles.css
    toc: true
    page-layout: full
    footnotes-hover: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    fig-align: center
    link-external-icon: false
    link-external-newwindow: true
    email-obfuscation: javascript
    include-in-header:
      - "files/includes/_academic.qmd"
      - "analytics.html"